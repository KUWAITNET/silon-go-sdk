name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Module minimum (matches the `go` directive) plus the latest stable.
        go-version: ['1.24', 'stable']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
          check-latest: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./... -count=1
